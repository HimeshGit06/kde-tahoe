<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <!-- Rendering: match macOS light hinting + subpixel AA -->
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
  <edit mode="assign" name="rgba">
   <const>rgb</const>
  </edit>
  <edit mode="assign" name="lcdfilter">
   <const>lcddefault</const>
  </edit>
  <edit mode="assign" name="autohint">
   <bool>false</bool>
  </edit>
 </match>
 <!-- SF Pro: prefer Text for small sizes, Display for large -->
 <alias>
  <family>sans-serif</family>
  <prefer>
   <family>SF Pro Text</family>
   <family>SF Pro Display</family>
   <family>Inter</family>
   <family>DejaVu Sans</family>
  </prefer>
 </alias>
 <alias>
  <family>monospace</family>
  <prefer>
   <family>SF Mono</family>
   <family>DejaVu Sans Mono</family>
  </prefer>
 </alias>
 <!-- Map common generic names to SF Pro -->
 <match target="pattern">
  <test name="family">
   <string>Helvetica</string>
  </test>
  <edit mode="assign" name="family">
   <string>SF Pro Text</string>
  </edit>
 </match>
 <match target="pattern">
  <test name="family">
   <string>Arial</string>
  </test>
  <edit mode="assign" name="family">
   <string>SF Pro Text</string>
  </edit>
 </match>
 <!-- Optical size: use SF Pro Text below 20px, Display above -->
 <match target="pattern">
  <test name="family">
   <string>SF Pro</string>
  </test>
  <test compare="less" name="size">
   <double>20</double>
  </test>
  <edit mode="assign" name="family">
   <string>SF Pro Text</string>
  </edit>
 </match>
 <match target="pattern">
  <test name="family">
   <string>SF Pro</string>
  </test>
  <test compare="more" name="size">
   <double>19</double>
  </test>
  <edit mode="assign" name="family">
   <string>SF Pro Display</string>
  </edit>
 </match>
